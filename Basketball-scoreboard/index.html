<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="title">HOME</h3>
                <p class="home-score">0</p>
                 <div class="controls">
                    <button class="plus-1" onclick="addToHomePoints(1)">+1</button>
                    <button class="plus-2" onclick="addToHomePoints(2)">+2</button>
                    <button class="plus-3" onclick="addToHomePoints(3)">+3</button>
                </div>
            </div>
            <div>
                <h3 class="title">GUEST</h3>
                <p class="guest-score">0</p>
                <div class="controls">
                    <button class="plus-1" onclick="addToGuestPoints(1)">+1</button>
                    <button class="plus-2" onclick="addToGuestPoints(2)">+2</button>
                    <button class="plus-3" onclick="addToGuestPoints(3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
